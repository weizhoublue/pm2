name: Binary Smoke Test

on: [push, pull_request]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build binary with pkg
        run: |
          mkdir -p ./dist
          npx pkg@5.8.1 . --targets node18-linux-x64 --output ./dist/pm2

      - name: Run smoke tests
        shell: bash
        run: bash test/smoke-test.sh ./dist/pm2
